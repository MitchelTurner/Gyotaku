name: Generator CI

on:
  push:
    paths:
      - "generator/**"
      - ".github/workflows/generator-ci.yml"
  pull_request:
    paths:
      - "generator/**"
      - ".github/workflows/generator-ci.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: generator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: generator/pyproject.toml
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Unit tests + corpus gate helpers
        run: pytest -q
      - name: Optional full corpus gate
        if: ${{ vars.GYOTAKU_CORPUS_GATE == '1' }}
        run: gyotaku corpus --gate -o corpus/runs/ci-gate
