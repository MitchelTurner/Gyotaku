services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gyotaku
      POSTGRES_PASSWORD: gyotaku
      POSTGRES_DB: gyotaku
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minio minio12345;
      mc mb -p local/gyotaku || true;
      mc anonymous set download local/gyotaku || true;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
